# Local SaaS stack: MySQL + Kafka-compatible broker + platform monolith.
# Run from repo root: docker compose -f docker/docker-compose.saas.yml up --build
#
# Payment orders and notification hooks run inside the monolith (no separate JVMs).

services:
  mysqldb:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: newdb
    networks:
      - saas
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --mode
      - dev-container
      - --smp
      - "1"
    ports:
      - "19092:19092"
    networks:
      - saas

  sms-platform:
    build: ../
    ports:
      - "8080:8080"
    depends_on:
      mysqldb:
        condition: service_healthy
    networks:
      - saas
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/newdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: dev-jwt-secret-change-me-please-32chars-minimum
      GOOGLE_CLIENT_ID: dev
      GOOGLE_CLIENT_SECRET: dev
      SMS_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SMS_GOOGLE_OAUTH_REDIRECT_URI: http://127.0.0.1:5173/oauth/google

networks:
  saas:
