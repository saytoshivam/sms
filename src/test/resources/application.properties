spring.main.allow-circular-references=true
spring.datasource.url=jdbc:h2:mem:sms_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.kafka.bootstrap-servers=localhost:9092

app.jwt.secret=test-jwt-secret-at-least-32-characters-long
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test

sms.oauth.google.redirect-uri=http://127.0.0.1:5173/oauth/google
sms.platform.owner-email-domains=myhaimi.com
sms.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5174

sms.seed.superadmin.username=admin
sms.seed.superadmin.email=admin@test.com
sms.seed.superadmin.password=secret

sms.seed.demo-school.enabled=false

sms.payments.public-base-url=http://localhost:8080
sms.payments.demo-auto-complete=false
sms.payments.webhook-secret=test-webhook-secret
