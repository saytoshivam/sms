spring.application.name=sms
# createDatabaseIfNotExist: after `DROP DATABASE`, MySQL recreates empty `newdb` on first connect; Flyway then applies migrations.
spring.datasource.url=jdbc:mysql://localhost:3307/newdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing dev DBs already have a Hibernate-built schema. Baseline at the latest applied migration so
# Flyway treats current state as up-to-date and only runs migrations with version > baseline.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=20260428000001
spring.flyway.repair-on-migrate=true
# Allow applying older-versioned migrations that arrive after newer ones have already run.
spring.flyway.out-of-order=true

spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl.auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-circular-references = true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Must match an authorized redirect URI in Google Cloud Console (SPA URL that receives ?code=...).
sms.oauth.google.redirect-uri=${SMS_GOOGLE_OAUTH_REDIRECT_URI:http://127.0.0.1:5173/oauth/google}

# Must be >= 32 chars for HS256 (jjwt enforces >=256 bits)
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-32-chars-minimum}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:1209600000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Comma-separated list of email domains allowed to onboard new schools (MyHaimi platform operators).
sms.platform.owner-email-domains=${SMS_PLATFORM_OWNER_EMAIL_DOMAINS:myhaimi.com}

# Browser CORS origins (comma-separated). Needed for local Vite dev server calling the API on a different origin/port.
sms.cors.allowed-origins=${SMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:5176,http://127.0.0.1:5176}

# Local/dev seed user (change in production via env vars)
sms.seed.superadmin.username=${SMS_SEED_SUPERADMIN_USERNAME:superadmin}
sms.seed.superadmin.email=${SMS_SEED_SUPERADMIN_EMAIL:superadmin@myhaimi.com}
sms.seed.superadmin.password=${SMS_SEED_SUPERADMIN_PASSWORD:abc}

# Rich demo tenant (Greenwood International): classes, students, marks, attendance, users — skipped if school code already exists.
sms.seed.demo-school.enabled=${SMS_SEED_DEMO_SCHOOL_ENABLED:true}
sms.seed.demo-school.password=${SMS_SEED_DEMO_SCHOOL_PASSWORD:demo123}

# Payment microservice (fee online intents)
sms.payments.public-base-url=${SMS_PAYMENTS_PUBLIC_BASE_URL:http://localhost:8080}
sms.payments.webhook-secret=${SMS_PAYMENTS_WEBHOOK_SECRET:change-me-payment-webhook}
sms.payments.demo-auto-complete=${SMS_PAYMENTS_DEMO_AUTO_COMPLETE:false}

# ── File storage ──────────────────────────────────────────────────────────────
# Set to "s3" for production; "local" uses the local filesystem (default for dev)
storage.provider=${STORAGE_PROVIDER:local}
storage.local.base-path=${STORAGE_LOCAL_BASE_PATH:uploads}

# S3 / R2 / B2 settings (only used when storage.provider=s3)
storage.s3.bucket=${STORAGE_S3_BUCKET:}
storage.s3.region=${STORAGE_S3_REGION:ap-south-1}
storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}
# Optional: override endpoint for R2 (Cloudflare) or B2 (Backblaze)
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}

# Multipart upload limits
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=32MB

