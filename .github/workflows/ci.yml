name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  monolith:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Test monolith
        run: ./gradlew test --no-daemon
